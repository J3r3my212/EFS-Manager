// ─── SERVICE PLAN PROFITABILITY TAB ──────────────────────────────────────────
function SvcPlanTab() {
  const SVC_LOADED = 47.75;

  // All editable PM costs and labor times
  const MAT_DEFAULTS = {
    // Oil PM materials
    nozzleCost: 6.45,
    pumpScreenCost: 1.60,
    stdFilterCost: 1.94,
    spinOnCost: 10.38,
    // Other PM materials
    acMatCost: 15.00,
    gasMatCost: 8.00,
    hpMatCost: 12.00,
    geoMatCost: 15.00,
    // Add-on PM materials
    humidMatCost: 18.00,    // water panel + misc
    tanklessFlushCost: 25.00, // acid flush supplies
    whMatCost: 8.00,        // WH PM materials
    // PM labor times (hrs)
    oilPremHrs: 1.75,
    oilBasicHrs: 0.75,
    acHrs: 1.00,
    gasHrs: 0.75,
    hpHrs: 1.25,
    geoHrs: 1.50,
    humidHrs: 0.50,
    tanklessHrs: 1.50,
    whHrs: 0.50,
  };

  const defaults = {
    driveHrs: 0.5,
    // Plan customer counts
    oilPremCount: 40,
    oilBasicCount: 60,
    acPlanCount: 30,
    gasPlanCount: 25,
    hpPlanCount: 15,
    // Repair behavior
    repairCallPct: 30,
    avgRepairTicket: 285,
    // Vehicle costs
    annualVehicleCost: 28000,
    billableHrsPerYear: 1600,
    // Plan customer counts (new)
    geoPlanCount: 5,
    humidPlanCount: 20,
    tanklessPlanCount: 10,
    whPlanCount: 15,
    // PM materials + labor times (editable)
    ...MAT_DEFAULTS,
  };

  const [s, setS] = useState(()=>{
    try { const saved=localStorage.getItem("efs_svcplan_sliders"); return saved?{...defaults,...JSON.parse(saved)}:defaults; }
    catch { return defaults; }
  });

  const save = v => { setS(v); try{localStorage.setItem("efs_svcplan_sliders",JSON.stringify(v));}catch{} };
  const upd = (k,v) => save({...s,[k]:v});

  // PM materials — derived from state (must be after useState)
  const PM_MAT_STANDARD = ((s.nozzleCost||6.45) + (s.pumpScreenCost||1.60) + (s.stdFilterCost||1.94)) * 1.06;
  const PM_MAT_SPINON_AVG = ((s.spinOnCost||10.38) * 1.06) / 2;

  // PM labor times — derived from state
  const OIL_PREM_HRS = s.oilPremHrs || 1.75;
  const OIL_BASIC_HRS = s.oilBasicHrs || 0.75;

  // Vehicle cost per hour
  const vehCostPerHr = s.billableHrsPerYear > 0 ? s.annualVehicleCost / s.billableHrsPerYear : 0;
  const totalLoadedRate = SVC_LOADED + vehCostPerHr;

  // Per-visit cost calc
  const visitCost = (laborHrs, matCost) => {
    const labor = laborHrs * totalLoadedRate;
    const drive = s.driveHrs * totalLoadedRate;
    return labor + drive + matCost;
  };

  // Annual repair cost per plan customer
  const annualRepairCost = (discPct) => {
    const repairFreq = s.repairCallPct / 100;
    const avgRevPerCall = s.avgRepairTicket;
    const avgCostPerCall = avgRevPerCall * (1 - 0.40); // assume 40% GP at full rate
    const discountLoss = avgRevPerCall * discPct * repairFreq;
    return { repairFreq, discountLoss, avgCostPerCall, repairCalls: repairFreq };
  };

  // Plan type definitions
  const plans = [
    {id:"oilPrem",  label:"Oil Premium Plan",         fee:299.95, count:s.oilPremCount,    countKey:"oilPremCount",    pmHrs:OIL_PREM_HRS,           matCost:PM_MAT_STANDARD+PM_MAT_SPINON_AVG, discPct:0.20, color:"#7B1C1C"},
    {id:"oilBasic", label:"Oil Basic Plan",            fee:219.95, count:s.oilBasicCount,   countKey:"oilBasicCount",   pmHrs:OIL_BASIC_HRS,          matCost:PM_MAT_STANDARD+PM_MAT_SPINON_AVG, discPct:0.10, color:"#92400e"},
    {id:"ac",       label:"A/C Plan",                  fee:179.95, count:s.acPlanCount,     countKey:"acPlanCount",     pmHrs:s.acHrs||1.00,          matCost:(s.acMatCost||15.00)*1.06,         discPct:0.10, color:"#1d4ed8"},
    {id:"gas",      label:"Gas Plan",                  fee:179.95, count:s.gasPlanCount,    countKey:"gasPlanCount",    pmHrs:s.gasHrs||0.75,         matCost:(s.gasMatCost||8.00)*1.06,         discPct:0.10, color:"#065f46"},
    {id:"hp",       label:"Heat Pump Plan",            fee:229.95, count:s.hpPlanCount,     countKey:"hpPlanCount",     pmHrs:s.hpHrs||1.25,          matCost:(s.hpMatCost||12.00)*1.06,         discPct:0.10, color:"#4c1d95"},
    {id:"geo",      label:"Geothermal Plan",           fee:249.95, count:s.geoPlanCount||0, countKey:"geoPlanCount",    pmHrs:s.geoHrs||1.50,         matCost:(s.geoMatCost||15.00)*1.06,        discPct:0.10, color:"#0f766e"},
    {id:"humid",    label:"Humidifier Add-On",         fee:99.95,  count:s.humidPlanCount||0,countKey:"humidPlanCount", pmHrs:s.humidHrs||0.50,       matCost:(s.humidMatCost||18.00)*1.06,      discPct:0.10, color:"#6366f1"},
    {id:"tankless", label:"Gas Tankless WH Add-On",    fee:179.95, count:s.tanklessPlanCount||0,countKey:"tanklessPlanCount",pmHrs:s.tanklessHrs||1.50,matCost:(s.tanklessFlushCost||25.00)*1.06, discPct:0.10, color:"#0369a1"},
    {id:"wh",       label:"Water Heater Add-On",       fee:99.95,  count:s.whPlanCount||0,  countKey:"whPlanCount",     pmHrs:s.whHrs||0.50,          matCost:(s.whMatCost||8.00)*1.06,          discPct:0.10, color:"#7c3aed"},
  ];

  // Calculate per-plan metrics
  const planMetrics = plans.map(p => {
    const pmCost = visitCost(p.pmHrs, p.matCost);
    const { repairFreq, discountLoss } = annualRepairCost(p.discPct);
    const totalCostPerCustomer = pmCost + discountLoss;
    const marginPerCustomer = p.fee - totalCostPerCustomer;
    const marginPct = p.fee > 0 ? (marginPerCustomer / p.fee) * 100 : 0;
    const totalRevenue = p.fee * p.count;
    const totalCost = totalCostPerCustomer * p.count;
    const totalMargin = totalRevenue - totalCost;
    return { ...p, pmCost, discountLoss, totalCostPerCustomer, marginPerCustomer, marginPct, totalRevenue, totalCost, totalMargin };
  });

  const totalCustomers = planMetrics.reduce((s,p)=>s+p.count,0);
  const totalPlanRevenue = planMetrics.reduce((s,p)=>s+p.totalRevenue,0);
  const totalPlanCost = planMetrics.reduce((s,p)=>s+p.totalCost,0);
  const totalPlanMargin = totalPlanRevenue - totalPlanCost;
  const blendedMarginPct = totalPlanRevenue > 0 ? (totalPlanMargin/totalPlanRevenue)*100 : 0;

  const sliderRow = (label, key, min, max, step, format, note) => (
    <div key={key} style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text2)"}}>{label}</span>
        <span style={{fontFamily:"var(--font-mono)",fontSize:13,fontWeight:700,color:"var(--amber)"}}>{format(s[key])}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={s[key]}
        onChange={e=>upd(key, parseFloat(e.target.value))}
        style={{width:"100%",accentColor:"var(--amber)"}} />
      {note&&<div style={{fontSize:10,color:"var(--text4)",marginTop:2}}>{note}</div>}
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>

      {/* Header KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        <div className="kpi"><div className="kpi-label">Total Plan Customers</div><div className="kpi-value">{totalCustomers}</div><div className="kpi-sub">across all plan types</div></div>
        <div className="kpi"><div className="kpi-label">Annual Plan Revenue</div><div className="kpi-value">{fmt(totalPlanRevenue)}</div><div className="kpi-sub">plan fees only</div></div>
        <div className="kpi"><div className="kpi-label">Plan Margin</div>
          <div className="kpi-value" style={{color:blendedMarginPct>=40?"var(--green)":blendedMarginPct>=25?"var(--amber)":"var(--red)"}}>{fmtPct(blendedMarginPct)}</div>
          <div className="kpi-sub">{fmt(totalPlanMargin)} after PM + discount cost</div>
        </div>
        <div className="kpi"><div className="kpi-label">Loaded Rate w/ Vehicle</div>
          <div className="kpi-value" style={{fontSize:22}}>${totalLoadedRate.toFixed(2)}/hr</div>
          <div className="kpi-sub">${SVC_LOADED.toFixed(2)} labor + ${vehCostPerHr.toFixed(2)} vehicle</div>
        </div>
      </div>

      <div className="grid-2">

        {/* Per-plan breakdown */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div className="card-title" style={{padding:"0 0 8px",borderBottom:"1px solid var(--border)",marginBottom:4}}>
            <span className="dot"/>Per-Plan Analysis
          </div>
          {planMetrics.map(p=>(
            <div key={p.id} style={{background:"#fff",border:`1.5px solid ${p.marginPct>=40?"#bbf7d0":p.marginPct>=25?"#fde68a":"#fecaca"}`,borderRadius:8,padding:"12px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:p.color}}>{p.label}</div>
                  <div style={{fontSize:11,color:"var(--text4)"}}>{p.count} customers · ${p.fee}/yr</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"var(--font-display)",fontSize:22,fontWeight:700,color:p.marginPct>=40?"var(--green)":p.marginPct>=25?"var(--amber)":"var(--red)"}}>{fmtPct(p.marginPct)}</div>
                  <div style={{fontSize:11,color:"var(--text4)"}}>margin</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,fontSize:11}}>
                {[
                  ["Fee","$"+p.fee.toFixed(2),"var(--text2)"],
                  ["PM cost","-$"+p.pmCost.toFixed(2),"var(--red)"],
                  ["Disc. loss","-$"+p.discountLoss.toFixed(2),"var(--amber)"],
                  ["Margin","$"+p.marginPerCustomer.toFixed(2),p.marginPerCustomer>0?"var(--green)":"var(--red)"],
                ].map(([l,v,c])=>(
                  <div key={l} style={{background:"var(--surface2)",borderRadius:4,padding:"4px 6px",textAlign:"center"}}>
                    <div style={{color:"var(--text4)",fontSize:10,marginBottom:1}}>{l}</div>

                  <span style={{fontFamily:"var(--font-mono)",fontWeight:700,color:p.totalMargin>0?"var(--green)":"var(--red)"}}>{fmt(p.totalMargin)}</span>

              <div style={{marginTop:8,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:10,color:"var(--text4)",flexShrink:0}}>Customers:</span>
                <input type="range" min={0} max={1000} step={5} value={p.count}

// ─── TECH MANAGEMENT (standalone — writes efs_techs for EFS-Quotes) ───────────
const DEFAULT_TECHS = [
  {id:1,name:"Jeremy Krause",pin:"0000",active:true},
];

function TechManagement() {
  const [techs, setTechs] = useState(()=>{
    try { const s=localStorage.getItem("efs_techs"); return s?JSON.parse(s):DEFAULT_TECHS; }
    catch { return DEFAULT_TECHS; }
  });
  const [form, setForm] = useState({name:"",pin:""});
  const [editing, setEditing] = useState(null); // id of tech being edited
  const [editForm, setEditForm] = useState({});
  const [error, setError] = useState("");
  const [saved, setSaved] = useState(false);

  function saveTechs(updated) {
    setTechs(updated);
    try { localStorage.setItem("efs_techs", JSON.stringify(updated)); } catch {}
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  }

  function validatePin(pin, excludeId=null) {
    if(!/^\d{4}$/.test(pin)) return "PIN must be exactly 4 digits";
    if(techs.some(t=>t.pin===pin&&t.id!==excludeId)) return "PIN already in use by another tech";
    return null;
  }

  function addTech() {
    const err = validatePin(form.pin);
    if(!form.name.trim()) { setError("Name is required"); return; }
    if(err) { setError(err); return; }
    setError("");
    const newTech = {id:Date.now(), name:form.name.trim(), pin:form.pin, active:true};
    saveTechs([...techs, newTech]);
    setForm({name:"",role:"Lead Installer",pin:""});
  }

  function removeTech(id) {
    if(techs.length<=1) { setError("Must keep at least one tech"); return; }
    saveTechs(techs.filter(t=>t.id!==id));
  }

  function toggleActive(id) {
    saveTechs(techs.map(t=>t.id===id?{...t,active:!t.active}:t));
  }

  function startEdit(tech) {
    setEditing(tech.id);
    setEditForm({name:tech.name, pin:tech.pin});
    setError("");
  }

  function saveEdit(id) {
    const err = validatePin(editForm.pin, id);
    if(!editForm.name.trim()) { setError("Name is required"); return; }
    if(err) { setError(err); return; }
    setError("");
    saveTechs(techs.map(t=>t.id===id?{...t,name:editForm.name.trim(),pin:editForm.pin}:t));
    setEditing(null);
  }

  return (
    <div className="card">
      <div className="card-title"><span className="dot" style={{background:"#7B1C1C"}}/>Team & PINs — EFS-Quotes Access</div>
      <div style={{fontSize:12,color:"var(--text3)",marginBottom:14}}>
        Techs listed here can log into EFS-Quotes using their 4-digit PIN. Every quote and job completion is stamped with their name automatically.
        {saved&&<span style={{marginLeft:12,color:"var(--green)",fontWeight:700}}>✓ Saved to localStorage</span>}
      </div>

      {/* Current techs */}
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
        {techs.map(t=>(
          <div key={t.id} style={{background:t.active?"#fff":"var(--surface2)",border:`1.5px solid ${t.active?"var(--border)":"var(--border2)"}`,borderRadius:8,padding:"10px 14px"}}>
            {editing===t.id ? (
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div className="form-group" style={{flex:2,minWidth:140}}>
                  <label>Name</label>
                  <input value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} />
                </div>
                <div className="form-group" style={{width:90}}>
                  <label>PIN (4 digits)</label>
                  <input maxLength={4} value={editForm.pin} onChange={e=>setEditForm({...editForm,pin:e.target.value.replace(/\D/g,"").slice(0,4)})} style={{fontFamily:"var(--font-mono)",letterSpacing:4,fontSize:16,fontWeight:700}} />
                </div>
                <button onClick={()=>saveEdit(t.id)} style={{padding:"8px 16px",background:"var(--green)",color:"#fff",border:"none",borderRadius:6,fontWeight:700,fontSize:12,cursor:"pointer"}}>Save</button>
                <button onClick={()=>{setEditing(null);setError("");}} style={{padding:"8px 12px",background:"transparent",border:"1px solid var(--border)",borderRadius:6,fontSize:12,cursor:"pointer",color:"var(--text3)"}}>Cancel</button>
              </div>
            ) : (
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:t.active?"var(--text)":"var(--text4)"}}>{t.name}</div>
                </div>
                <div style={{fontFamily:"var(--font-mono)",fontSize:18,fontWeight:700,letterSpacing:6,color:t.active?"var(--blue)":"var(--text4)",background:"var(--surface2)",padding:"4px 12px",borderRadius:6}}>{t.pin}</div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>toggleActive(t.id)} style={{padding:"5px 12px",background:t.active?"var(--amber-bg)":"var(--green-bg)",border:`1px solid ${t.active?"var(--amber-border)":"var(--green-border)"}`,borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer",color:t.active?"var(--amber)":"var(--green)"}}>
                    {t.active?"Deactivate":"Activate"}
                  </button>
                  <button onClick={()=>startEdit(t)} style={{padding:"5px 12px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer",color:"var(--text3)"}}>Edit</button>
                  <button onClick={()=>removeTech(t.id)} style={{padding:"5px 10px",background:"var(--red-bg)",border:"1px solid var(--red-border)",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer",color:"var(--red)"}}>✕</button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Add new tech */}
      <div style={{background:"var(--surface2)",borderRadius:8,padding:"14px 16px",border:"1px solid var(--border)"}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Add New Tech</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
          <div className="form-group" style={{flex:2,minWidth:140}}>
            <label>Name</label>
            <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Tech name" />
          </div>
          <div className="form-group" style={{width:90}}>
            <label>PIN (4 digits)</label>
            <input maxLength={4} value={form.pin} onChange={e=>setForm({...form,pin:e.target.value.replace(/\D/g,"").slice(0,4)})} placeholder="••••" style={{fontFamily:"var(--font-mono)",letterSpacing:4,fontSize:16,fontWeight:700}} />
          </div>
          <button onClick={addTech} style={{padding:"9px 18px",background:"#7B1C1C",color:"#fff",border:"none",borderRadius:6,fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0}}>Add Tech</button>
        </div>
        {error&&<div style={{fontSize:12,color:"var(--red)",marginTop:8,fontWeight:700}}>⚠ {error}</div>}
      </div>

      <div style={{fontSize:11,color:"var(--text4)",marginTop:10}}>
        PINs are saved to <code style={{background:"var(--surface2)",padding:"1px 5px",borderRadius:3}}>efs_techs</code> localStorage and read automatically by EFS-Quotes for authentication.
        Deactivated techs cannot log in but their job history is preserved.
      </div>
    </div>
  );
}

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
const MANAGER_PW_KEY = "efs_manager_auth";
const DEFAULT_PASSWORD = "EFSmanager2026"; // Change this in Settings after first login

function LoginScreen({ onUnlock }) {
  const [pw, setPw] = useState("");
  const [error, setError] = useState("");
  const [show, setShow] = useState(false);

  function attempt() {
    const stored = localStorage.getItem("efs_manager_pw") || DEFAULT_PASSWORD;
    if(pw === stored) {
      sessionStorage.setItem(MANAGER_PW_KEY, "1");
      onUnlock();
    } else {
      setError("Incorrect password");
      setPw("");
      setTimeout(()=>setError(""),3000);
    }
  }

  return (
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"#fff",borderRadius:16,padding:"40px 36px",width:"100%",maxWidth:380,boxShadow:"0 25px 60px rgba(0,0,0,0.4)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontFamily:"var(--font-display)",fontSize:26,fontWeight:700,color:"#0f172a",marginBottom:4}}>Elite Fuel Service</div>
          <div style={{fontSize:13,color:"#64748b"}}>Manager Portal — Authorized Access Only</div>
        </div>
        <div className="form-group" style={{marginBottom:16}}>
          <label>Password</label>
          <div style={{position:"relative"}}>
            <input
              type={show?"text":"password"}
              value={pw}
              onChange={e=>setPw(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&pw&&attempt()}
              placeholder="Enter manager password"
              autoFocus
              style={{width:"100%",paddingRight:44,fontSize:15,borderColor:error?"var(--red)":"var(--border)"}}
            />
            <button onClick={()=>setShow(!show)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"var(--text4)",fontSize:13}}>
              {show?"Hide":"Show"}
            </button>
          </div>
          {error&&<div style={{fontSize:12,color:"var(--red)",marginTop:6,fontWeight:700}}>⚠ {error}</div>}
        </div>
        <button onClick={attempt} disabled={!pw}
          style={{width:"100%",padding:"13px",background:pw?"#7B1C1C":"#cbd5e1",color:"#fff",border:"none",borderRadius:8,fontSize:15,fontWeight:700,cursor:pw?"pointer":"not-allowed",marginBottom:16}}>
          Sign In
        </button>
        <div style={{fontSize:11,color:"#94a3b8",textAlign:"center",lineHeight:1.5}}>
          Elite Fuel Service LLC · Reading, PA<br/>Authorized personnel only
        </div>
      </div>
    </div>
  );
}

        <div className="header">
          <div className="header-logo">{settings.companyName}</div>
          <div className="header-sub">{settings.location}</div>
          <div className="header-divider" />
          <div className="header-badge">EFS-Manager · {settings.serviceManager}</div>
          <div className="header-badge blue">Rate: ${settings.labourRate}/hr</div>
          <div className="header-badge blue">Target GP: {settings.gpTarget}%</div>
        </div>
        <div className="nav">
          <div className="nav-group">
            <span className="nav-group-label">Operations</span>
            {TABS.filter(t=>t.group==="ops").map(t=><button key={t.id} className={"nav-tab"+(tab===t.id?" active":"")} onClick={()=>setTab(t.id)}>{t.label}</button>)}
          </div>
          <div className="nav-group">
            <span className="nav-group-label">Financial</span>
            {TABS.filter(t=>t.group==="fin").map(t=><button key={t.id} className={"nav-tab"+(tab===t.id?" active-fin active":"")} onClick={()=>setTab(t.id)}>{t.label}</button>)}
          </div>
          <div className="nav-group" style={{borderRight:"none"}}>
            {TABS.filter(t=>t.group==="cfg").map(t=><button key={t.id} className={"nav-tab"+(tab===t.id?" active":"")} onClick={()=>setTab(t.id)}>{t.label}</button>)}
          </div>
        </div>
        <div className="main">{renderTab()}</div>
      </div>
    </SettingsCtx.Provider>
  );
}

const { useState, useMemo, useRef, createContext, useContext, useEffect } = React;
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
