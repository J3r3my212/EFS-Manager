const fmt = n => n == null ? "—" : "$" + Math.round(n).toLocaleString();
const fmtPct = n => n == null ? "—" : n.toFixed(1) + "%";

// ── Parts markup tiers (FieldEdge standard, 1.5x floor) ──────────────────────
const MARKUP_TIERS = [
  {max:2.00,    mult:5.00},
  {max:5.00,    mult:4.00},
  {max:10.00,   mult:3.50},
  {max:20.00,   mult:3.00},
  {max:40.00,   mult:2.75},
  {max:60.00,   mult:2.50},
  {max:100.00,  mult:2.25},
  {max:150.00,  mult:2.00},
  {max:Infinity,mult:1.75},
];
const MARKUP_FLOOR = 1.5;

function calcPartsSellPrice(cost, useFlat=false, flatMult=1.5) {
  if(cost <= 0) return 0;
  if(useFlat) {
    const mult = Math.max(flatMult, MARKUP_FLOOR);
    return Math.ceil((cost * mult) / 5) * 5;
  }
  const tier = MARKUP_TIERS.find(t => cost <= t.max);
  const mult = Math.max(tier ? tier.mult : 1.75, MARKUP_FLOOR);
  return Math.ceil((cost * mult) / 5) * 5;
}

  const pos = (e, c) => { const r = c.getBoundingClientRect(), s = e.touches ? e.touches[0] : e; return {x:s.clientX-r.left,y:s.clientY-r.top}; };
  const start = e => { e.preventDefault(); drawing.current=true; const c=ref.current,ctx=c.getContext("2d"),p=pos(e,c); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
  const move = e => { e.preventDefault(); if(!drawing.current) return; const c=ref.current,ctx=c.getContext("2d"); ctx.strokeStyle="#0f172a"; ctx.lineWidth=2; ctx.lineCap="round"; const p=pos(e,c); ctx.lineTo(p.x,p.y); ctx.stroke(); setHas(true); };
  const end = () => { drawing.current=false; };
  const clear = () => { ref.current.getContext("2d").clearRect(0,0,400,120); setHas(false); };
  return (
    <div>
      <canvas ref={ref} width={400} height={120} style={{background:"#f8fafc",border:"1.5px solid #cbd5e1",borderRadius:6,display:"block",width:"100%",cursor:"crosshair",touchAction:"none"}}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end} />
      <div style={{display:"flex",gap:8,marginTop:8}}>
        <button onClick={clear} style={{flex:1,padding:"8px",background:"transparent",border:"1px solid #e2e8f0",borderRadius:5,cursor:"pointer",fontSize:12,color:"#64748b"}}>Clear</button>
        <button onClick={()=>has&&onSign()} disabled={!has} style={{flex:2,padding:"8px",background:has?"#2563eb":"#cbd5e1",color:"#fff",border:"none",borderRadius:5,cursor:has?"pointer":"not-allowed",fontSize:13,fontWeight:700}}>Sign & Accept</button>
      </div>
    </div>
  );
}

function QuoteTab() {

  const RL = labourRate||RATE, TL = (taxRate||6)/100, CL = (commissionPct||12)/100, GP = gpTarget||40;
  const [lines, setLines] = useState([{cat:"heatPumps",model:"",qty:1,customLabel:"",customCost:""}]);
  const [labour, setLabour] = useState({prepTech:1,prepHrs:0.5,tech1:8,tech2:8,tech3:0,appQty:1,appHrs:8,appPct:25,adminMin:30});
  const [flags, setFlags] = useState({dualFuel:false,tankless:false,gasConv:false,ductwork:false,oilRemoval:false,attic:false,oilTank:false});
  const [jobName, setJobName] = useState(""); const [jobAddress, setJobAddress] = useState(""); const [jobNote, setJobNote] = useState(""); const [prepBy, setPrepBy] = useState("");
  const [showProposal, setShowProposal] = useState(false);
  const [tierPrices, setTierPrices] = useState({standard:"",premium:"",elite:""});

    if(q.jobName) setJobName(q.jobName); if(q.jobAddress) setJobAddress(q.jobAddress); if(q.jobNote) setJobNote(q.jobNote);
    if(q.lines&&q.lines.length) setLines(q.lines); if(q.labour) setLabour(q.labour); if(q.flags) setFlags(q.flags);
    setTierPrices({standard:"",premium:"",elite:""});
  }

  const catOpts = [{v:"heatPumps",l:"Heat Pumps"},{v:"condensers",l:"A/C"},{v:"airHandlers",l:"Air Handlers"},{v:"furnaces",l:"Furnaces"},{v:"coils",l:"Coils"},{v:"thermostats",l:"Thermostats"},{v:"accessories",l:"Accessories"},{v:"custom",l:"Custom"}];
  const addLine = () => setLines([...lines,{cat:"accessories",model:"",qty:1,customLabel:"",customCost:""}]);

  const updLine = (i,k,v) => setLines(lines.map((l,idx)=>idx===i?{...l,[k]:v,...(k==="cat"?{model:""}:{})}:l));

    if(l.cat==="custom") return s+(parseFloat(l.customCost)||0)*(parseInt(l.qty)||1);
    const p=(PARTS[l.cat]||[]).find(x=>x.model===l.model); return p?s+p.cost*(parseInt(l.qty)||1):s;
  },0),[lines]);
  const matTax = matCost*TL, matTotal = matCost+matTax;
  const labCost = useMemo(()=>labour.prepTech*labour.prepHrs*RL+labour.tech1*RL+labour.tech2*RL+labour.tech3*RL+labour.appQty*labour.appHrs*(labour.appPct/100)*RL+(labour.adminMin/60)*RL,[labour,RL]);
  const totCost = matTotal+labCost;

  const premCount = Object.values(flags).filter(Boolean).length;

  function buildEquip() {
    const ico={heatPumps:"❄️",condensers:"❄️",airHandlers:"💨",furnaces:"🔥",coils:"🔩",thermostats:"🌡️",accessories:"🔧"};
    return lines.filter(l=>l.model||l.customLabel).map(l=>{
      if(l.cat==="custom") return {type:"Custom",model:l.customLabel,icon:"🔧",specs:[]};
      const p=(PARTS[l.cat]||[]).find(x=>x.model===l.model); return p?{type:l.cat,model:p.label,icon:ico[l.cat]||"🔧",specs:[]}:null;
    }).filter(Boolean);
  }

  function buildProposal() {
    const eq=buildEquip(); const def=[Math.round(s38),Math.round(s40),Math.round(s42)];
    const keys=["standard","premium","elite"];
    const tiers=keys.map((k,i)=>({price:parseFloat(tierPrices[k])||def[i],tagline:["Reliable comfort","Enhanced efficiency","Maximum efficiency"][i],equipment:eq,services:[],warranties:[]}));
    return {customerName:jobName||"Valued Customer",address:jobAddress,serviceManager:prepBy||serviceManager,tiers};
  }

  return (
    <div>
      <div style={{marginBottom:20}}><AIAssistant onApply={applyQuote} /></div>
      <div className="grid-12" style={{gap:20,alignItems:"start"}}>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div className="card">
            <div className="card-title"><span className="dot"/>Job Details</div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              <div className="form-group" style={{flex:1,minWidth:150}}><label>Customer</label><input value={jobName} onChange={e=>setJobName(e.target.value)} placeholder="John Smith" /></div>
              <div className="form-group" style={{flex:1,minWidth:150}}><label>Address</label><input value={jobAddress} onChange={e=>setJobAddress(e.target.value)} placeholder="123 Main St" /></div>
              <div className="form-group" style={{flex:"0 0 140px"}}><label>Prepared By</label><input value={prepBy} onChange={e=>setPrepBy(e.target.value)} placeholder={serviceManager} /></div>
            </div>
            <div className="form-row"><div className="form-group" style={{gridColumn:"1/-1"}}><label>Job Notes</label><input value={jobNote} onChange={e=>setJobNote(e.target.value)} placeholder="Basement, easy access, 15ft lineset..." /></div></div>
          </div>

          <div className="card">
            <div className="card-title"><span className="dot"/>Equipment & Materials</div>
            {lines.map((line,i)=>{
              const opts=PARTS[line.cat]||[];
              return (
                <div key={i} style={{display:"grid",gridTemplateColumns:"140px 1fr 60px 36px",gap:8,marginBottom:8,alignItems:"end"}}>
                  <div className="form-group">{i===0&&<label>Category</label>}<select value={line.cat} onChange={e=>updLine(i,"cat",e.target.value)}>{catOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select></div>
                  <div className="form-group">{i===0&&<label>Item</label>}
                    {line.cat==="custom"?(
                      <div style={{display:"flex",gap:8}}>
                        <input placeholder="Description" value={line.customLabel} onChange={e=>updLine(i,"customLabel",e.target.value)} />
                        <input placeholder="Cost $" style={{width:80}} value={line.customCost} onChange={e=>updLine(i,"customCost",e.target.value)} />
                      </div>
                    ):(
                      <select value={line.model} onChange={e=>updLine(i,"model",e.target.value)}>
                        <option value="">— Select —</option>
                        {opts.map(p=><option key={p.model} value={p.model}>{p.label} — ${p.cost.toFixed(2)}</option>)}
                      </select>
                    )}
                  </div>
                  <div className="form-group">{i===0&&<label>Qty</label>}<input type="number" min="1" value={line.qty} onChange={e=>updLine(i,"qty",e.target.value)} /></div>
                  <button className="btn btn-outline btn-sm" style={{marginBottom:1,color:"var(--red)",borderColor:"var(--red-border)"}} onClick={()=>remLine(i)}>x</button>
                </div>
              );
            })}
            <button className="btn btn-outline btn-sm" style={{marginTop:8}} onClick={addLine}>+ Add Line</button>
          </div>

          <div className="card">
            <div className="card-title"><span className="dot"/>Labour — 3-Component Standard</div>
            <div className="form-section">
              <div className="form-section-title">Off-Site Prep</div>
              <div className="form-row">
                <div className="form-group"><label>Prep Techs</label><input type="number" min="0" value={labour.prepTech} onChange={e=>setLabour({...labour,prepTech:parseFloat(e.target.value)||0})} /></div>
                <div className="form-group"><label>Prep Hours</label><input type="number" min="0" step="0.25" value={labour.prepHrs} onChange={e=>setLabour({...labour,prepHrs:parseFloat(e.target.value)||0})} /></div>
              </div>
            </div>
            <div className="form-section">
              <div className="form-section-title">On-Site Hours</div>
              <div className="form-row">
                {[["tech1","Tech 1"],["tech2","Tech 2"],["tech3","Tech 3"]].map(([k,l])=>(
                  <div key={k} className="form-group"><label>{l} (hrs)</label><input type="number" min="0" step="0.25" value={labour[k]} onChange={e=>setLabour({...labour,[k]:parseFloat(e.target.value)||0})} /></div>
                ))}
              </div>
              <div className="form-row">
                <div className="form-group"><label>App Qty</label><input type="number" min="0" value={labour.appQty} onChange={e=>setLabour({...labour,appQty:parseInt(e.target.value)||0})} /></div>
                <div className="form-group"><label>App Hours</label><input type="number" min="0" step="0.25" value={labour.appHrs} onChange={e=>setLabour({...labour,appHrs:parseFloat(e.target.value)||0})} /></div>
                <div className="form-group"><label>App Rating</label>
                  <select value={labour.appPct} onChange={e=>setLabour({...labour,appPct:parseInt(e.target.value)})}>
                    <option value={0}>0% training</option><option value={25}>25% assist</option><option value={50}>50%</option><option value={75}>75%</option><option value={100}>100% full</option>
                  </select>
                </div>
              </div>
            </div>
            <div className="form-section">
              <div className="form-section-title">Admin Close-out</div>
              <div className="form-row"><div className="form-group"><label>Admin Minutes</label><input type="number" min="0" step="5" value={labour.adminMin} onChange={e=>setLabour({...labour,adminMin:parseInt(e.target.value)||0})} /></div></div>
            </div>
          </div>

          <div className="card">
            <div className="card-title"><span className="dot"/>Scope Flags</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {[["dualFuel","Dual Fuel"],["tankless","Tankless WH"],["gasConv","Gas Conversion"],["ductwork","Major Ductwork"],["oilRemoval","Oil Removal"],["attic","Attic Install"],["oilTank","Oil Tank"]].map(([k,l])=>(
                <button key={k} className="btn btn-sm" style={{background:flags[k]?"#eff6ff":"transparent",border:flags[k]?"1.5px solid var(--blue)":"1.5px solid var(--border)",color:flags[k]?"var(--blue)":"var(--text3)"}} onClick={()=>setFlags({...flags,[k]:!flags[k]})}>
                  {flags[k]?"✓ ":""}{l}
                </button>
              ))}
            </div>
            {premCount>=2&&<div className="flag"><span className="flag-icon">⚠</span><div className="flag-text"><strong>{premCount} PREMIUM TRIGGERS ACTIVE</strong> — Mandatory pricing review required.</div></div>}
            {flags.attic&&<div className="info-flag"><span style={{color:"var(--blue)"}}>ℹ</span><div className="info-flag-text">ATTIC: Add Goliath pan + float switches if not in materials.</div></div>}
            {flags.oilTank&&<div className="info-flag"><span style={{color:"var(--blue)"}}>ℹ</span><div className="info-flag-text">OIL TANK: Floor $3,750+. Don't forget cover ($276) + Tigerloop ($193).</div></div>}
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div className="card">
            <div className="card-title"><span className="dot"/>{jobName?jobName+" — Internal":"Quote Output — Internal Only"}</div>
            <div className="quote-block">
              <div className="quote-line header"><span>MATERIALS</span></div>
              {lines.map((line,i)=>{
                let label="",cost=0;
                if(line.cat==="custom"){label=line.customLabel||"Custom";cost=(parseFloat(line.customCost)||0)*(parseInt(line.qty)||1);}
                else{const p=(PARTS[line.cat]||[]).find(x=>x.model===line.model);if(!p)return null;label=p.label;cost=p.cost*(parseInt(line.qty)||1);}
                return <div className="quote-line" key={i}><span>{line.qty>1?line.qty+"x ":""}{label}</span><span>{fmt(cost)}</span></div>;
              })}
              <div className="quote-line"><span>PA Sales Tax ({taxRate||6}%)</span><span>{fmt(matTax)}</span></div>
              <div className="quote-line total"><span>Materials Total</span><span>{fmt(matTotal)}</span></div>
              <div className="quote-line header"><span>LABOUR</span></div>
              {labour.prepHrs>0&&<div className="quote-line"><span>Prep ({labour.prepTech}t x {labour.prepHrs}hrs)</span><span>{fmt(labour.prepTech*labour.prepHrs*RL)}</span></div>}
              {labour.tech1>0&&<div className="quote-line"><span>Tech 1 ({labour.tech1}hrs)</span><span>{fmt(labour.tech1*RL)}</span></div>}
              {labour.tech2>0&&<div className="quote-line"><span>Tech 2 ({labour.tech2}hrs)</span><span>{fmt(labour.tech2*RL)}</span></div>}
              {labour.tech3>0&&<div className="quote-line"><span>Tech 3 ({labour.tech3}hrs)</span><span>{fmt(labour.tech3*RL)}</span></div>}
              {labour.appQty>0&&labour.appHrs>0&&labour.appPct>0&&<div className="quote-line"><span>App ({labour.appQty}x{labour.appHrs}hrs @{labour.appPct}%)</span><span>{fmt(labour.appQty*labour.appHrs*(labour.appPct/100)*RL)}</span></div>}
              {labour.adminMin>0&&<div className="quote-line"><span>Admin ({labour.adminMin}min)</span><span>{fmt((labour.adminMin/60)*RL)}</span></div>}
              <div className="quote-line total"><span>Labour Total</span><span>{fmt(labCost)}</span></div>
              <div className="quote-line total" style={{fontSize:13}}><span>TOTAL COST</span><span>{fmt(totCost)}</span></div>
              <div className="quote-line" style={{color:totCost>0&&labCost/totCost>0.35?"var(--red)":"var(--text4)",fontSize:11}}>
                <span>Labour % of cost</span><span>{totCost>0?fmtPct((labCost/totCost)*100):"—"}{totCost>0&&labCost/totCost>0.35?" ⚠ HIGH":""}</span>
              </div>
              <div className="quote-line header"><span>SALE PRICE TARGETS</span></div>
              <div className="quote-line gp-target gp-35"><span>35% GP</span><span>{fmt(s35)}</span></div>
              <div className="quote-line gp-target gp-38"><span>38% GP</span><span>{fmt(s38)}</span></div>
              <div className="quote-line gp-target gp-40"><span>{GP}% GP — TARGET</span><span>{fmt(s40)}</span></div>
              <div className="quote-line gp-target gp-42"><span>{GP+2}% GP — STRETCH</span><span>{fmt(s42)}</span></div>
              <div className="quote-line header"><span>COMMISSION POOL @ {GP}%</span></div>
              <div className="quote-line"><span>Salesperson (3%)</span><span>{fmt(s40*GP/100*0.03)}</span></div>
              <div className="quote-line"><span>Lead Installer (5%)</span><span>{fmt(s40*GP/100*0.05)}</span></div>
              <div className="quote-line"><span>Helpers (4%)</span><span>{fmt(s40*GP/100*0.04)}</span></div>
              <div className="quote-line total"><span>Total ({commissionPct||12}%)</span><span>{fmt(s40*GP/100*CL)}</span></div>
            </div>
          </div>

          <div className="card" style={{border:"1.5px solid #bfdbfe",background:"#f8fbff"}}>
            <div className="card-title" style={{borderBottomColor:"#bfdbfe"}}><span className="dot"/>Generate Customer Proposal</div>
            <div style={{fontSize:13,color:"var(--text3)",marginBottom:16}}>Set prices per tier. Defaults from GP targets. No costs shown to customer.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
              {[["standard","#2563eb",s38],["premium","#d97706",s40],["elite","#7c3aed",s42]].map(([k,c,d])=>(
                <div key={k}>
                  <div style={{fontSize:11,fontWeight:700,color:c,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>{k}</div>
                  <div style={{fontSize:10,color:"var(--text4)",marginBottom:5}}>Default: {fmt(Math.round(d))}</div>
                  <input type="number" placeholder={String(Math.round(d))} value={tierPrices[k]} onChange={e=>setTierPrices(p=>({...p,[k]:e.target.value}))} style={{width:"100%",background:"#fff",border:`1.5px solid ${c}55`,color:"var(--text)",fontFamily:"var(--font-mono)",fontSize:13,padding:"8px 12px",borderRadius:5,outline:"none"}} />
                </div>
              ))}
            </div>
            <button onClick={()=>setShowProposal(true)} style={{width:"100%",padding:"13px",background:"#2563eb",color:"#fff",border:"none",borderRadius:7,fontSize:14,fontWeight:700,cursor:"pointer"}}>
              Preview Customer Proposal
            </button>
          </div>

          <div className="card">
            <div className="card-title"><span className="dot"/>Benchmark Comparison</div>
            <table className="data-table">
              <thead><tr><th>Job</th><th>Category</th><th>Sale</th><th>GP%</th><th>Grade</th></tr></thead>
              <tbody>{BENCHMARKS.map(b=>(
                <tr key={b.id}>
                  <td className="strong">{b.name}</td>
                  <td style={{fontSize:11,color:"var(--text3)"}}>{b.category}</td>
                  <td className="mono">{fmt(b.price)}</td>
                  <td className="mono" style={{color:gpColor(b.gpPct),fontWeight:700}}>{fmtPct(b.gpPct)}</td>
                  <td><span className={"badge "+(b.gpPct>=40?"badge-a":"badge-b")}>{b.grade} {b.flag}</span></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      </div>
      {showProposal&&<ProposalModal data={buildProposal()} onClose={()=>setShowProposal(false)} />}
    </div>
  );
}

// ─── PIPELINE TAB ─────────────────────────────────────────────────────────────
function PipelineTab() {
  const { gpTarget } = useSettings();
  const GP = gpTarget||40;
  const [jobs, setJobs] = useState(()=>{ try{const s=localStorage.getItem("efs_pipeline");return s?JSON.parse(s):PIPELINE_INIT;}catch{return PIPELINE_INIT;} });
  const [completed, setCompleted] = useState(()=>{ try{const s=localStorage.getItem("efs_completed");return s?JSON.parse(s):[];}catch{return [];} });
  const [showLost, setShowLost] = useState(false);
  const [showCompleted, setShowCompleted] = useState(false);
  const [completingJob, setCompletingJob] = useState(null);

  const saveJobs = u => { setJobs(u); try{localStorage.setItem("efs_pipeline",JSON.stringify(u));}catch{} };
  const saveCompleted = u => { setCompleted(u); try{localStorage.setItem("efs_completed",JSON.stringify(u));}catch{} };

  function moveStage(id, stage) {
    if (stage==="completed") { setCompletingJob(jobs.find(j=>j.id===id)); }
    else saveJobs(jobs.map(j=>j.id===id?{...j,stage}:j));
  }

  function handleSaveCompleted(details) {
    const job = completingJob;
    saveJobs(jobs.map(j=>j.id===job.id?{...j,stage:"completed"}:j));
    saveCompleted([...completed,{id:Date.now(),customer:job.customer,category:job.category,address:job.address,salePrice:parseFloat(details.salePrice),gpPct:details.gpPct,gpDol:details.gpDol,totalCost:details.totalCost,labourCost:details.labourCost,notes:details.notes,completedDate:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}]);
    setCompletingJob(null);
  }

  const lostJobs = jobs.filter(j=>j.stage==="lost");
  const activeJobs = jobs.filter(j=>j.stage!=="lost");
  const stages = ["open","scheduled","inprogress","completed"];
  const pipeVal = activeJobs.filter(j=>j.stage!=="completed").reduce((s,j)=>s+j.priceMin,0);
  const schedVal = activeJobs.filter(j=>j.stage==="scheduled"||j.stage==="inprogress").reduce((s,j)=>s+j.priceMin,0);
  const avgGP = completed.length?completed.reduce((s,j)=>s+j.gpPct,0)/completed.length:null;
  const totalRev = completed.reduce((s,j)=>s+j.salePrice,0);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div className="grid-4">
        <div className="kpi"><div className="kpi-label">Open Pipeline</div><div className="kpi-value">{fmt(pipeVal)}</div><div className="kpi-sub">{activeJobs.filter(j=>j.stage==="open").length} open</div></div>
        <div className="kpi"><div className="kpi-label">Scheduled/Active</div><div className="kpi-value" style={{color:"var(--amber)"}}>{fmt(schedVal)}</div><div className="kpi-sub">{activeJobs.filter(j=>j.stage==="scheduled"||j.stage==="inprogress").length} jobs</div></div>
        <div className="kpi"><div className="kpi-label">Completed Revenue</div><div className="kpi-value green">{fmt(totalRev)}</div><div className="kpi-sub">{completed.length} jobs reviewed</div></div>
        <div className="kpi"><div className="kpi-label">Avg Actual GP%</div><div className="kpi-value" style={{color:avgGP?gpColor(avgGP):"var(--text4)"}}>{avgGP?fmtPct(avgGP):"—"}</div><div className="kpi-sub">{avgGP?(avgGP>=GP?"On target":(GP-avgGP).toFixed(1)+"% below"):"complete jobs to track"}</div></div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
        {stages.map(stage=>{
          const cfg=STAGE_CFG[stage];
          const colJobs=activeJobs.filter(j=>j.stage===stage);
          return (
            <div key={stage}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:9,height:9,borderRadius:"50%",background:cfg.color}} /><span style={{fontSize:11,fontWeight:900,color:cfg.color,textTransform:"uppercase",letterSpacing:1.2}}>{cfg.label}</span></div>
                <span style={{fontSize:11,fontWeight:700,color:"#94a3b8",background:"#f1f5f9",borderRadius:12,padding:"1px 8px"}}>{colJobs.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10,minHeight:100}}>
                {colJobs.map(job=>(
                  <div key={job.id} style={{background:"#fff",border:`1.5px solid ${cfg.border}`,borderRadius:10,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#0f172a",marginBottom:2}}>{job.customer}</div>
                    <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>{job.category}</div>
                    <div style={{fontSize:14,fontWeight:700,color:cfg.color,marginBottom:6}}>{job.priceMin===job.priceMax?fmt(job.priceMin):fmt(job.priceMin)+"–"+fmt(job.priceMax)}</div>
                    {job.address&&<div style={{fontSize:11,color:"#94a3b8",marginBottom:6}}>{job.address}</div>}
                    <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.4,marginBottom:10}}>{job.notes}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {stage==="open"&&<><button onClick={()=>moveStage(job.id,"scheduled")} style={{fontSize:11,padding:"4px 10px",background:STAGE_CFG.scheduled.bg,border:`1px solid ${STAGE_CFG.scheduled.border}`,borderRadius:5,cursor:"pointer",color:STAGE_CFG.scheduled.color,fontWeight:700}}>Won</button><button onClick={()=>moveStage(job.id,"lost")} style={{fontSize:11,padding:"4px 10px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:5,cursor:"pointer",color:"#dc2626",fontWeight:700}}>Lost</button></>}
                      {stage==="scheduled"&&<><button onClick={()=>moveStage(job.id,"inprogress")} style={{fontSize:11,padding:"4px 10px",background:STAGE_CFG.inprogress.bg,border:`1px solid ${STAGE_CFG.inprogress.border}`,borderRadius:5,cursor:"pointer",color:STAGE_CFG.inprogress.color,fontWeight:700}}>Start</button><button onClick={()=>moveStage(job.id,"lost")} style={{fontSize:11,padding:"4px 10px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:5,cursor:"pointer",color:"#dc2626",fontWeight:700}}>Lost</button></>}
                      {stage==="inprogress"&&<button onClick={()=>moveStage(job.id,"completed")} style={{fontSize:11,padding:"4px 10px",background:STAGE_CFG.completed.bg,border:`1px solid ${STAGE_CFG.completed.border}`,borderRadius:5,cursor:"pointer",color:STAGE_CFG.completed.color,fontWeight:700}}>Complete & Review GP</button>}
                      {stage==="completed"&&<div style={{fontSize:11,padding:"4px 10px",background:STAGE_CFG.completed.bg,border:`1px solid ${STAGE_CFG.completed.border}`,borderRadius:5,color:STAGE_CFG.completed.color,fontWeight:700}}>GP Reviewed</div>}
                    </div>
                  </div>
                ))}
                {colJobs.length===0&&<div style={{border:"1.5px dashed #e2e8f0",borderRadius:10,minHeight:80,display:"flex",alignItems:"center",justifyContent:"center",color:"#cbd5e1",fontSize:12}}>Empty</div>}
              </div>
            </div>
          );
        })}
      </div>

      {completed.length>0&&(
        <div className="card">
          <div className="card-title" style={{cursor:"pointer"}} onClick={()=>setShowCompleted(!showCompleted)}>
            <span className="dot" style={{background:"#16a34a"}} />Completed Job Reviews ({completed.length})
            <span style={{marginLeft:"auto",fontSize:12,color:"var(--text4)",fontWeight:400}}>{showCompleted?"▲ Hide":"▼ Show"}</span>
          </div>
          {showCompleted&&(
            <table className="data-table">
              <thead><tr><th>Customer</th><th>Category</th><th>Sale</th><th>Cost</th><th>GP$</th><th>GP%</th><th>Date</th></tr></thead>
              <tbody>{completed.map(j=>(
                <tr key={j.id}>
                  <td className="strong">{j.customer}</td>
                  <td style={{fontSize:12,color:"var(--text3)"}}>{j.category}</td>
                  <td className="mono">{fmt(j.salePrice)}</td>
                  <td className="mono">{fmt(j.totalCost)}</td>
                  <td className="mono" style={{color:j.gpPct>=GP?"var(--green)":"var(--red)",fontWeight:700}}>{fmt(j.gpDol)}</td>
                  <td><span className={"badge "+(j.gpPct>=GP?"badge-a":"badge-warn")}>{fmtPct(j.gpPct)}</span></td>
                  <td style={{fontSize:11,color:"var(--text4)"}}>{j.completedDate}</td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </div>
      )}

      {lostJobs.length>0&&(
        <div style={{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
          <button onClick={()=>setShowLost(!showLost)} style={{width:"100%",padding:"10px 18px",background:"#f8fafc",border:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1}}>Lost Jobs ({lostJobs.length})</span>
            <span style={{fontSize:12,color:"#94a3b8"}}>{showLost?"▲ Hide":"▼ Show"}</span>
          </button>
          {showLost&&<div style={{padding:"12px 18px",display:"flex",flexDirection:"column",gap:8}}>
            {lostJobs.map(job=>(
              <div key={job.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#f8fafc",borderRadius:7}}>
                <div><span style={{fontSize:13,fontWeight:700,color:"#64748b"}}>{job.customer}</span><span style={{fontSize:12,color:"#94a3b8",marginLeft:10}}>{job.category} · {fmt(job.priceMin)}</span></div>
                <button onClick={()=>moveStage(job.id,"open")} style={{fontSize:11,padding:"4px 12px",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:5,cursor:"pointer",color:"#2563eb",fontWeight:700}}>Reopen</button>
              </div>
            ))}
          </div>}
        </div>
      )}

      {completingJob&&<CompletedJobForm job={completingJob} gpTarget={GP} onSave={handleSaveCompleted} onCancel={()=>setCompletingJob(null)} />}
    </div>
  );
}

// ─── BENCHMARKS TAB ───────────────────────────────────────────────────────────
function BenchmarksTab() {
  const avg = BENCHMARKS.reduce((s,b)=>s+b.gpPct,0)/BENCHMARKS.length;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div className="grid-4">
        <div className="kpi"><div className="kpi-label">Jobs Benchmarked</div><div className="kpi-value">{BENCHMARKS.length}</div><div className="kpi-sub">verified completed</div></div>
        <div className="kpi"><div className="kpi-label">Avg GP%</div><div className="kpi-value" style={{color:gpColor(avg)}}>{fmtPct(avg)}</div><div className="kpi-sub">vs 40% target</div></div>
        <div className="kpi"><div className="kpi-label">Best GP%</div><div className="kpi-value green">{fmtPct(Math.max(...BENCHMARKS.map(b=>b.gpPct)))}</div><div className="kpi-sub">David F / Fidler</div></div>
        <div className="kpi"><div className="kpi-label">Worst GP%</div><div className="kpi-value red">{fmtPct(Math.min(...BENCHMARKS.map(b=>b.gpPct)))}</div><div className="kpi-sub">Jeff Miller (5 triggers)</div></div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {BENCHMARKS.map(b=>(
          <div className="bench-card" key={b.id}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
              <div>
                <div className="bench-card-name">{b.flag} {b.name}</div>
                <div className="bench-card-meta">{b.category} · {b.location} · {b.techs} tech{b.techs>1?"s":""} x {b.days} day{b.days!==1?"s":""}</div>
              </div>
              <div style={{display:"flex",gap:20,alignItems:"center"}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text3)"}}>SALE / COST / GP$</div>
                  <div style={{fontFamily:"var(--font-mono)",fontSize:13}}>{fmt(b.price)} / {fmt(b.cost)} / {fmt(b.gp)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"var(--font-display)",fontSize:26,fontWeight:800,color:gpColor(b.gpPct)}}>{fmtPct(b.gpPct)}</div>

        ))}
      </div>
    </div>
  );
}

// ─── PARTS TAB ────────────────────────────────────────────────────────────────
function PartsTab() {
  const [search, setSearch] = useState("");
  const [activeGroup, setActiveGroup] = useState("all");
  const groups = [{k:"all",l:"All"},{k:"heatPumps",l:"Heat Pumps"},{k:"condensers",l:"A/C"},{k:"airHandlers",l:"Air Handlers"},{k:"furnaces",l:"Furnaces"},{k:"coils",l:"Coils"},{k:"thermostats",l:"Thermostats"},{k:"accessories",l:"Accessories"}];
  const allParts = Object.entries(PARTS).flatMap(([cat,parts])=>parts.map(p=>({...p,category:cat})));
  const filtered = allParts.filter(p=>{
    const mg=activeGroup==="all"||p.category===activeGroup;
    const q=search.toLowerCase();
    return mg&&(!q||p.label.toLowerCase().includes(q)||p.model.toLowerCase().includes(q));
  });
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
        <div className="form-group" style={{flex:1,minWidth:200}}><input placeholder="Search parts..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%"}} /></div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{groups.map(g=><button key={g.k} className={"inner-tab"+(activeGroup===g.k?" active":"")} onClick={()=>setActiveGroup(g.k)}>{g.l}</button>)}</div>
      </div>
      <div className="card" style={{padding:0}}>
        <table className="data-table">
          <thead><tr><th>Model</th><th>Description</th><th>Category</th><th>Cost (pre-tax)</th><th>Cost + 6% Tax</th></tr></thead>
          <tbody>{filtered.map((p,i)=>(
            <tr key={i}>
              <td className="mono" style={{fontSize:11,color:"var(--text3)"}}>{p.model}</td>
              <td className="strong">{p.label}</td>
              <td><span className="badge badge-pending" style={{fontSize:10}}>{p.category}</span></td>
              <td className="mono">{fmt(p.cost)}</td>
              <td className="mono" style={{color:"var(--blue)",fontWeight:700}}>{fmt(p.cost*1.06)}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div className="info-flag"><span style={{color:"var(--blue)"}}>ℹ</span><div className="info-flag-text">All Rheem +8% June 2026. Air handlers have coil built in — do NOT add separate coil. All costs pre-tax; add 6% PA sales tax when quoting.</div></div>
    </div>
  );
}

// ─── SERVICE JOB REVIEW MODAL ─────────────────────────────────────────────────
function ServiceJobReview({ job, onSave, onCancel }) {
  const [form, setForm] = useState({
    timeTravel:"", timeArrived:"", timeCompleted:"",
    actualHrs:"", result:"fixed", notes:""
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const calcedHrs = useMemo(()=>{
    if(form.timeTravel && form.timeCompleted) {
      const toMins = t => { const [h,m]=(t||"").split(":").map(Number); return isNaN(h)?null:h*60+(m||0); };
      const travel=toMins(form.timeTravel), done=toMins(form.timeCompleted);
      if(travel!==null && done!==null && done>travel) return ((done-travel)/60).toFixed(2);
    }
    return null;
  },[form.timeTravel,form.timeCompleted]);

  // On-site only (arrived → completed) for book comparison
  const onSiteHrs = useMemo(()=>{
    if(form.timeArrived && form.timeCompleted) {
      const toMins = t => { const [h,m]=(t||"").split(":").map(Number); return isNaN(h)?null:h*60+(m||0); };
      const arr=toMins(form.timeArrived), done=toMins(form.timeCompleted);
      if(arr!==null && done!==null && done>arr) return ((done-arr)/60).toFixed(2);
    }
    return null;
  },[form.timeArrived,form.timeCompleted]);

  // Drive time
  const driveHrs = useMemo(()=>{
    if(form.timeTravel && form.timeArrived) {
      const toMins = t => { const [h,m]=(t||"").split(":").map(Number); return isNaN(h)?null:h*60+(m||0); };
      const travel=toMins(form.timeTravel), arr=toMins(form.timeArrived);
      if(travel!==null && arr!==null && arr>travel) return ((arr-travel)/60).toFixed(2);
    }
    return null;
  },[form.timeTravel,form.timeArrived]);

  const actualHrs = parseFloat(form.actualHrs || calcedHrs) || 0;
  const bookHrs = job.bookHrs || 0;
  const charged = job.total || 0;
  const laborCost = actualHrs * SVC_LOADED_RATE;
  const gpDol = charged - laborCost;
  const gpPct = charged > 0 ? (gpDol/charged)*100 : 0;
  const beatBook = bookHrs > 0 && actualHrs > 0 && actualHrs <= bookHrs;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.6)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:24,backdropFilter:"blur(3px)"}}>
      <div style={{background:"#fff",borderRadius:12,width:"100%",maxWidth:580,boxShadow:"0 20px 60px rgba(0,0,0,0.2)",overflow:"hidden",margin:"auto"}}>
        <div style={{background:"#f8fafc",borderBottom:"3px solid #7B1C1C",padding:"18px 22px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#7B1C1C",letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Job Review</div>
            <div style={{fontSize:18,fontWeight:700,color:"#0f172a"}}>{job.customer}</div>
            <div style={{fontSize:12,color:"#64748b"}}>{job.equipment} · Charged: ${charged.toFixed(2)}</div>
          </div>
          <button onClick={onCancel} style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:"50%",width:28,height:28,cursor:"pointer",fontSize:13,color:"#64748b",fontWeight:700}}>x</button>
        </div>
        <div style={{padding:"18px 22px",display:"flex",flexDirection:"column",gap:14}}>
          {actualHrs>0&&(
            <div style={{background:gpPct>=40?"var(--green-bg)":gpPct>=25?"var(--amber-bg)":"var(--red-bg)",border:`2px solid ${gpPct>=40?"#22c55e":gpPct>=25?"#fde68a":"#fca5a5"}`,borderRadius:10,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:gpPct>=40?"var(--green)":gpPct>=25?"var(--amber)":"var(--red)",marginBottom:3}}>
                  {bookHrs>0?(beatBook?"✓ Beat the Book":"⚠ Over Book Time"):"GP on this call"}
                </div>
                <div style={{fontFamily:"var(--font-display)",fontSize:32,fontWeight:700,color:gpPct>=40?"var(--green)":gpPct>=25?"var(--amber)":"var(--red)",lineHeight:1}}>{fmtPct(gpPct)}</div>
                {bookHrs>0&&<div style={{fontSize:11,color:"var(--text4)",marginTop:3}}>Book: {bookHrs.toFixed(2)}hr · Actual: {actualHrs.toFixed(2)}hr</div>}
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:12,color:"var(--text3)"}}>Charged: <strong>${charged.toFixed(2)}</strong></div>
                <div style={{fontSize:12,color:"var(--text3)"}}>Labor cost: <strong>${laborCost.toFixed(2)}</strong></div>
                <div style={{fontSize:13,fontWeight:700,color:gpPct>=40?"var(--green)":"var(--red)",marginTop:3}}>GP$: {fmt(gpDol)}</div>
              </div>
            </div>
          )}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Job Times (optional)</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              {[["Traveled","timeTravel"],["Arrived","timeArrived"],["Completed Job","timeCompleted"]].map(([l,k])=>(
                <div key={k} className="form-group"><label>{l}</label><input type="time" value={form[k]} onChange={e=>set(k,e.target.value)} style={{fontFamily:"var(--font-mono)"}} /></div>
              ))}
            </div>
            {driveHrs&&<div style={{fontSize:11,color:"var(--text4)",marginTop:4}}>Drive: {driveHrs}hr</div>}
            {onSiteHrs&&<div style={{fontSize:11,color:"var(--text4)"}}>On-site: {onSiteHrs}hr</div>}
            {calcedHrs&&<div style={{fontSize:11,color:"var(--blue)",marginTop:2}}>Total job time: {calcedHrs}hr — GP calculated on this</div>}
          </div>
          <div className="form-group">
            <label>Total Job Hours {calcedHrs?"(override auto-calc)":"(enter manually — travel + on-site)"}</label>
            <input type="number" min="0" step="0.25" placeholder={calcedHrs||"e.g. 1.5"} value={form.actualHrs} onChange={e=>set("actualHrs",e.target.value)} style={{fontFamily:"var(--font-mono)",maxWidth:160}} />
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Result</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[["fixed","✓ Fixed","#16a34a"],["partial","⚡ Partial","#d97706"],["callback","↩ Callback","#dc2626"],["quoted","📋 Quote Only","#2563eb"]].map(([v,l,c])=>(
                <button key={v} onClick={()=>set("result",v)} style={{padding:"7px 16px",borderRadius:20,border:`2px solid ${form.result===v?c:"var(--border)"}`,background:form.result===v?c:"#fff",color:form.result===v?"#fff":"var(--text3)",fontWeight:700,fontSize:12,cursor:"pointer"}}>{l}</button>
              ))}
            </div>
          </div>
          <div className="form-group"><label>Notes</label><textarea value={form.notes} onChange={e=>set("notes",e.target.value)} rows={2} placeholder="Parts not on truck, callback reason, anything unusual..." /></div>
          <button onClick={()=>onSave({...form,actualHrs:parseFloat(form.actualHrs||calcedHrs)||0,onSiteHrs:parseFloat(onSiteHrs)||0,driveHrs:parseFloat(driveHrs)||0,gpPct,gpDol,laborCost,charged})}
            style={{width:"100%",padding:13,background:"#7B1C1C",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer"}}>
            Save Job Review
          </button>
        </div>
      </div>
    </div>
  );
}

  const [actualHrsInput, setActualHrsInput] = useState("");
  const [logTimes, setLogTimes] = useState({timeTravelLog:"",timeArrivedLog:"",timeCompletedLog:""});

  // Auto-calc from log times
  const logTimeCalc = useMemo(()=>{
    const toMins = t => { const [h,m]=(t||"").split(":").map(Number); return isNaN(h)?null:h*60+(m||0); };
    const travel = toMins(logTimes.timeTravelLog);
    const arrived = toMins(logTimes.timeArrivedLog);
    const completed = toMins(logTimes.timeCompletedLog);
    const drive = (travel!==null&&arrived!==null&&arrived>travel) ? ((arrived-travel)/60).toFixed(2) : null;
    const onSite = (arrived!==null&&completed!==null&&completed>arrived) ? ((completed-arrived)/60).toFixed(2) : null;
    const total = (travel!==null&&completed!==null&&completed>travel) ? ((completed-travel)/60).toFixed(2) : null;
    return {drive, onSite, total};
  },[logTimes]);

  // ── Pricing calculations ──
  const dispatchFee = useMemo(()=>{

  const lineSubtotal = useMemo(()=>lineItems.reduce((s,l)=>s+l.price,0),[lineItems]);
  const lineDiscount = lineSubtotal * discountPct;
  const lineTotal = lineSubtotal - lineDiscount;
  const grandTotal = dispatchFee + lineTotal;

  const totalBookHrs = useMemo(()=>lineItems.reduce((s,l)=>s+(l.hrs||0),0),[lineItems]);

      `${j.equipment||"unknown"}: ${j.actualHrs||0}hr actual, ${j.bookHrs||0}hr book, GP${(j.gpPct||0).toFixed(0)}%`
    ).join(" | ");

    const markupDesc = partsMarkupMethod==="flat"
      ? `Flat ${partsMarkupFlat||150}% markup (${((partsMarkupFlat||150)/100).toFixed(2)}x)`
      : "Tiered markup (FieldEdge: $0-2=5x, $2-5=4x, $5-10=3.5x, $10-20=3x, $20-40=2.75x, $40-60=2.5x, $60-100=2.25x, $100-150=2x, $150+=1.75x, floor 1.5x)";

    const system = `You are a service quote assistant for Elite Fuel Service HVAC in Reading PA.
Owner: Jeremy Krause. Target GP: ${gp}%. Loaded labor cost: $${SVC_LOADED_RATE}/hr.
Parts markup method: ${markupDesc}
Plan: ${plan==="plan20"?"Premium Oil Plan — 20% off all repair items":plan==="plan10"?"Standard Plan — 10% off all repair items":"No plan — full price"}.
Minimum GP floor: ${SVC_GP_FLOOR}%. ALWAYS flag if your recommended pricing falls below this floor.
${innerTab==="quote"&&returnTrip?"Return trip (parts not in stock): add $"+RETURN_TRIP_COST+" hidden cost to GP calc.":""}

PARTS DATABASE (use these — they have real invoice costs):
${partsRef}

${REPAIR_TIMES}

${jobHistory.length>0?`JEREMY'S ACTUAL JOB HISTORY (use these times over book estimates when similar):
${jobHistory}`:"No job history yet — use time reference above."}

YOUR JOB:
When Jeremy describes a repair needed, respond with:
1. PARTS NEEDED — list exact part names from the DB above with their cost. If not in DB, say "not in DB yet — add invoice cost".
2. LABOR TIME — use job history first if similar job exists, otherwise use time reference. State which you used.
3. PRICING — calculate: (parts cost + labor hrs × $${SVC_LOADED_RATE} cost) ÷ (1 - ${gp/100}) = price for ${gp}% GP. Also show price for ${SVC_GP_FLOOR}% floor GP. Show the math clearly.
4. SUGGESTED PRICE — round up to nearest $5 or $10. State final GP%.
5. FLOOR CHECK — if suggested price after any plan discount results in GP below ${SVC_GP_FLOOR}%, clearly flag: "⚠ BELOW GP FLOOR — to hit ${SVC_GP_FLOOR}% you need to charge $X" and explain why (usually plan discount on expensive parts).
${plan!=="none"?`6. PLAN PRICE — apply ${plan==="plan20"?"20%":"10%"} discount to get customer price. Re-check GP after discount.`:""}

Format: be concise, show numbers clearly. After your response Jeremy can add parts to the quote manually.`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:msgs})});
      const data = await res.json();
      const text = data.content?.map(b=>b.type==="text"?b.text:"").join("")||"Error";
      setAiMessages([...msgs,{role:"assistant",content:text}]);
    } catch { setAiMessages([...msgs,{role:"assistant",content:"Network error. Check connection."}]); }
    setAiLoading(false);
  }

  // ── Pipeline ──
  const saveSvcJobs = u => { setSvcJobs(u); try{localStorage.setItem("efs_svc_pipeline",JSON.stringify(u));}catch{} };
  const saveSvcCompleted = u => { setSvcCompleted(u); try{localStorage.setItem("efs_svc_completed",JSON.stringify(u));}catch{} };

  function saveJob(toHistory) {
    const entry = {id:Date.now(),customer,address,equipment,prepBy:prepBy||serviceManager,plan,dispatchFee,repairRevenue:lineTotal,total:grandTotal,lineItems,totalCost,gpPct,gpDol,bookHrs:totalBookHrs,actualHrs,driveHrs:parseFloat(logTimeCalc.drive)||0,onSiteHrs:parseFloat(logTimeCalc.onSite)||0,returnTrip,notes,mode,createdDate:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})};
    if(toHistory) {
      saveSvcCompleted([...svcCompleted,{...entry,result:"completed",completedDate:entry.createdDate,actualHrs:totalBookHrs}]);
    } else {
      saveSvcJobs([...svcJobs,{...entry,stage:"open"}]);
      setInnerTab("pipeline");
    }
    clearForm();
  }

  function moveSvcStage(id, stage) {
    if(stage==="completed") { setReviewingJob(svcJobs.find(j=>j.id===id)); }
    else saveSvcJobs(svcJobs.map(j=>j.id===id?{...j,stage}:j));
  }

  function handleSvcReview(details) {
    const job = reviewingJob;
    saveSvcJobs(svcJobs.map(j=>j.id===job.id?{...j,stage:"completed"}:j));
    saveSvcCompleted([...svcCompleted,{...job,result:details.result,completedDate:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),actualHrs:details.actualHrs,gpPct:details.gpPct,gpDol:details.gpDol,laborCost:details.laborCost,timeOnWay:details.timeOnWay,timeArrived:details.timeArrived,timeCompleted:details.timeCompleted,notes:details.notes}]);
    setReviewingJob(null);
  }

  // ── Scorecard ──
  const svcLost = svcJobs.filter(j=>j.stage==="lost");
  const svcActive = svcJobs.filter(j=>j.stage!=="lost");
  const totalQuoted = svcActive.length + svcLost.length + svcCompleted.length;
  const converted = svcActive.filter(j=>j.stage!=="open").length + svcCompleted.length;
  const convRate = totalQuoted>0?(converted/totalQuoted)*100:0;
  const avgGP = svcCompleted.length?svcCompleted.reduce((s,j)=>s+(j.gpPct||0),0)/svcCompleted.length:null;
  const totalDispatch = svcCompleted.reduce((s,j)=>s+(j.dispatchFee||0),0);
  const callbacks = svcCompleted.filter(j=>j.result==="callback").length;
  const cbRate = svcCompleted.length>0?(callbacks/svcCompleted.length)*100:null;
  const timeEntries = svcCompleted.filter(j=>j.bookHrs>0&&j.actualHrs>0);
  const avgTimeVsBook = timeEntries.length>0?timeEntries.reduce((s,j)=>s+(j.actualHrs/j.bookHrs),0)/timeEntries.length:null;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>

      {/* Scorecard */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12}}>
        {[
          {label:"Jobs Tracked",value:totalQuoted||"—",sub:"all time"},
          {label:"Conversion Rate",value:totalQuoted>0?fmtPct(convRate):"—",sub:`${converted} won`,color:convRate>=60?"var(--green)":convRate>=40?"var(--amber)":"var(--text4)"},
          {label:"Avg Repair GP%",value:avgGP!=null?fmtPct(avgGP):"—",sub:"repair work only",color:avgGP!=null?gpColor(avgGP):"var(--text4)"},
          {label:"Dispatch Revenue",value:totalDispatch>0?fmt(totalDispatch):"—",sub:"call fees collected"},
          {label:"Callback Rate",value:cbRate!=null?fmtPct(cbRate):"—",sub:`${callbacks} callbacks`,color:cbRate!=null?(cbRate<=5?"var(--green)":cbRate<=15?"var(--amber)":"var(--red)"):"var(--text4)"},
        ].map(({label,value,sub,color})=>(
          <div key={label} className="kpi" style={{borderTop:"3px solid #7B1C1C"}}>
            <div className="kpi-label">{label}</div>
            <div className="kpi-value" style={{fontSize:22,color:color||"var(--blue)"}}>{value}</div>
            <div className="kpi-sub">{sub}</div>
          </div>
        ))}
      </div>

      {/* Inner tabs */}
      <div style={{display:"flex",gap:0,borderBottom:"1px solid var(--border)"}}>
        {[["log","Log Completed Job"],["quote","Build a Quote"],["pipeline","Service Pipeline"]].map(([id,label])=>(
          <button key={id} onClick={()=>setInnerTab(id)}
            style={{padding:"10px 20px",fontSize:13,fontWeight:700,border:"none",background:"none",cursor:"pointer",borderBottom:`2.5px solid ${innerTab===id?"#7B1C1C":"transparent"}`,color:innerTab===id?"#7B1C1C":"var(--text3)",marginBottom:-1}}>
            {label}
          </button>
        ))}
      </div>

      {/* ── LOG COMPLETED JOB / BUILD QUOTE (shared UI, different mode) ── */}
      {(innerTab==="log"||innerTab==="quote")&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"start"}}>

          {/* LEFT COLUMN — inputs */}
          <div style={{display:"flex",flexDirection:"column",gap:12}}>

            {/* Mode banner */}
            <div style={{background:innerTab==="log"?"#f0fdf4":"#eff6ff",border:`1.5px solid ${innerTab==="log"?"#bbf7d0":"#bfdbfe"}`,borderRadius:8,padding:"10px 14px"}}>
              <div style={{fontSize:12,fontWeight:700,color:innerTab==="log"?"var(--green)":"var(--blue)"}}>
                {innerTab==="log"?"📋 Log Completed Job — enter what happened, all fees, actual parts used":"💬 Build a Quote — dispatch already collected, pricing for return trip with parts"}
              </div>
            </div>

            {/* Customer info */}
            <div className="card" style={{padding:16}}>
              <div className="card-title" style={{marginBottom:12,paddingBottom:8}}><span className="dot"/>Job Details</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div className="form-group"><label>Customer *</label><input value={customer} onChange={e=>setCustomer(e.target.value)} placeholder="John Smith" /></div>
                <div className="form-group"><label>Equipment</label><input value={equipment} onChange={e=>setEquipment(e.target.value)} placeholder="Carrier 58STA furnace" /></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div className="form-group"><label>Address</label><input value={address} onChange={e=>setAddress(e.target.value)} placeholder="123 Main St" /></div>
                <div className="form-group"><label>Prepared By</label><input value={prepBy} onChange={e=>setPrepBy(e.target.value)} placeholder={serviceManager} /></div>
              </div>
            </div>

            {/* Plan + Dispatch */}
            <div className="card" style={{padding:16}}>
              <div className="card-title" style={{marginBottom:12,paddingBottom:8}}><span className="dot"/>Plan & Dispatch</div>

              {/* Plan selector */}
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Service Plan</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {[["none","No Plan","#64748b"],["plan10","Standard Plan (10% off)","#2563eb"],["plan20","Premium Oil Plan (20% off + waived dispatch)","#7B1C1C"]].map(([v,l,c])=>(
                    <button key={v} onClick={()=>setPlan(v)} style={{padding:"6px 14px",borderRadius:20,border:`2px solid ${plan===v?c:"var(--border)"}`,background:plan===v?c:"#fff",color:plan===v?"#fff":"var(--text3)",fontWeight:700,fontSize:11,cursor:"pointer"}}>{l}</button>
                  ))}
                </div>
              </div>

              {/* Dispatch fee */}
              <div style={{marginBottom:innerTab==="quote"?12:0}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>
                  {innerTab==="log"?"Dispatch / Call Fee":"Dispatch Fee (already collected — shown for reference)"}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {DISPATCH_FEES.map(d=>{
                    const price = plan==="plan20"?d.plan20:plan==="plan10"?d.plan10:d.regular;
                    return (
                      <label key={d.id} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 10px",borderRadius:6,border:`1.5px solid ${dispatchId===d.id?"#7B1C1C":"var(--border)"}`,background:dispatchId===d.id?"#fff5f5":"#fff",cursor:"pointer"}}>
                        <input type="radio" name="dispatch" checked={dispatchId===d.id} onChange={()=>setDispatchId(d.id)} style={{accentColor:"#7B1C1C"}} />
                        <span style={{flex:1,fontSize:12,fontWeight:dispatchId===d.id?700:400,color:dispatchId===d.id?"#7B1C1C":"var(--text2)"}}>{d.label}</span>
                        <span style={{fontFamily:"var(--font-mono)",fontSize:12,fontWeight:700,color:price===0&&d.regular>0?"var(--green)":"var(--text2)"}}>{price===0&&d.regular>0?"WAIVED":"$"+price.toFixed(2)}</span>
                      </label>
                    );
                  })}
                </div>
              </div>

              {/* Return trip toggle — quote mode only */}
              {innerTab==="quote"&&(
                <label style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:6,border:`1.5px solid ${returnTrip?"#dc2626":"var(--border)"}`,background:returnTrip?"#fef2f2":"#fff",cursor:"pointer"}}>
                  <input type="checkbox" checked={returnTrip} onChange={e=>setReturnTrip(e.target.checked)} style={{accentColor:"#dc2626"}} />
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:returnTrip?"#dc2626":"var(--text2)"}}>Return Trip (parts not in stock)</div>
                    <div style={{fontSize:11,color:"var(--text4)"}}>Adds ${RETURN_TRIP_COST.toFixed(2)} to your cost — hidden from customer, baked into pricing</div>
                  </div>
                </label>
              )}
            </div>

            {/* Labor hours per line item */}
            <div className="card" style={{padding:16}}>
              <div className="card-title" style={{marginBottom:12,paddingBottom:8}}><span className="dot"/>Labor Hours</div>
              <div style={{fontSize:12,color:"var(--text3)",marginBottom:10}}>Enter estimated hours for each repair. AI assistant will suggest based on your job history.</div>
              {lineItems.length>0?(
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {lineItems.map((item,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 10px",background:"var(--surface2)",borderRadius:6}}>
                      <span style={{flex:1,fontSize:12,color:"var(--text2)"}}>{item.label}</span>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                        <label style={{fontSize:11,color:"var(--text4)"}}>hrs:</label>
                        <input type="number" min="0" step="0.25" value={item.hrs||""} placeholder="0.0"
                          onChange={e=>setLineItems(l=>l.map((x,idx)=>idx===i?{...x,hrs:parseFloat(e.target.value)||0}:x))}
                          style={{width:60,fontFamily:"var(--font-mono)",fontSize:12,fontWeight:700,border:"1.5px solid var(--border)",borderRadius:4,padding:"3px 6px",outline:"none"}} />
                      </div>
                    </div>
                  ))}
                  <div style={{fontSize:11,color:"var(--text4)",marginTop:4}}>Total book hrs: <strong>{totalBookHrs.toFixed(2)}hr</strong> · Est. labor cost: <strong>${(totalBookHrs*SVC_LOADED_RATE).toFixed(2)}</strong></div>
                </div>
              ):(
                <div style={{fontSize:12,color:"var(--text4)",padding:"8px 0"}}>Add parts below then set hours here</div>
              )}
            </div>

            {/* Parts DB quick-add */}
            <div className="card" style={{padding:16}}>
              <div className="card-title" style={{marginBottom:12,paddingBottom:8}}><span className="dot"/>Parts Database</div>
              <input value={partsSearch} onChange={e=>setPartsSearch(e.target.value)} placeholder="Search parts — e.g. Beckett, expansion tank, capacitor..." style={{width:"100%",padding:"8px 12px",border:"1.5px solid var(--border)",borderRadius:6,fontSize:12,outline:"none",marginBottom:8}} />
              <div style={{display:"flex",flexDirection:"column",gap:3,maxHeight:200,overflowY:"auto"}}>
                {Object.entries(PARTS).flatMap(([cat,parts])=>parts.map(p=>({...p,cat})))
                  .filter(p=>!partsSearch.trim()||p.label.toLowerCase().includes(partsSearch.toLowerCase())||p.model.toLowerCase().includes(partsSearch.toLowerCase()))
                  .map((p,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",borderRadius:4,background:i%2===0?"#fff":"#f8fafc",border:"1px solid transparent"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,color:"var(--text2)",fontWeight:500}}>{p.label}</div>
                      <div style={{fontSize:10,color:"var(--text4)"}}>{p.model} · cost: ${p.cost.toFixed(2)} · full sell: ${calcPartsSellPrice(p.cost, partsMarkupMethod==="flat", (partsMarkupFlat||150)/100).toFixed(2)}{discountPct>0?" → after discount: $"+(calcPartsSellPrice(p.cost, partsMarkupMethod==="flat", (partsMarkupFlat||150)/100)*(1-discountPct)).toFixed(2):""}</div>
                    </div>
                    <button onClick={()=>{addPartLine(p);setPartsSearch("");}} style={{padding:"4px 10px",background:"var(--blue)",color:"#fff",border:"none",borderRadius:4,fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0}}>+ Add</button>
                  </div>
                ))}
              </div>
              <div style={{fontSize:11,color:"var(--text4)",marginTop:8}}>Part not here? Add it to the Parts DB in Settings → Parts tab first.</div>
            </div>
          </div>

          {/* RIGHT COLUMN — AI + quote summary */}
          <div style={{display:"flex",flexDirection:"column",gap:12}}>

            {/* AI Assistant */}
            <div className="card" style={{border:"1.5px solid #fecaca",background:"#fff5f5",padding:16}}>
              <div className="card-title" style={{marginBottom:12,paddingBottom:8,borderBottomColor:"#fecaca"}}><span className="dot" style={{background:"#7B1C1C"}}/>AI Quote Assistant</div>
              <div style={{fontSize:11,color:"#7B1C1C",marginBottom:10}}>Describe the job — AI will suggest parts, labor hours, and pricing to hit your GP target.</div>
              {aiMessages.length===0&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                  {[
                    "Replace expansion tank, drain & refill boiler system",
                    "Beckett fuel unit swap on oil furnace, tight basement",
                    "Run capacitor replacement on A/C condenser",
                    "Zone valve not opening, Honeywell replacement needed",
                    "Oil burner tune-up, nozzle + electrodes + filter"
                  ].map(ex=>(
                    <button key={ex} onClick={()=>setAiInput(ex)} style={{fontSize:11,padding:"5px 10px",background:"#fff",border:"1.5px solid #fecaca",borderRadius:16,color:"#7B1C1C",cursor:"pointer",fontWeight:600}}>{ex}</button>
                  ))}
                </div>
              )}
              {aiMessages.length>0&&(
                <div style={{maxHeight:200,overflowY:"auto",marginBottom:10,display:"flex",flexDirection:"column",gap:8}}>
                  {aiMessages.map((m,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                      <div style={{maxWidth:"90%",padding:"8px 12px",borderRadius:m.role==="user"?"10px 10px 2px 10px":"10px 10px 10px 2px",background:m.role==="user"?"#7B1C1C":"#fff",color:m.role==="user"?"#fff":"#334155",fontSize:12,lineHeight:1.6,border:m.role==="assistant"?"1px solid #e2e8f0":"none",whiteSpace:"pre-wrap"}}>{m.content}</div>
                    </div>
                  ))}
                  {aiLoading&&<div style={{fontSize:12,color:"var(--text4)"}}>Thinking...</div>}
                </div>
              )}
              <div style={{display:"flex",gap:8}}>
                <input value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&aiInput.trim()&&sendAI(aiInput.trim())} placeholder="Describe the repair needed..." style={{flex:1,padding:"8px 12px",border:"1.5px solid #fecaca",borderRadius:6,fontSize:12,outline:"none",background:"#fff"}} />
                <button onClick={()=>aiInput.trim()&&sendAI(aiInput.trim())} disabled={aiLoading||!aiInput.trim()} style={{padding:"8px 14px",background:aiInput.trim()&&!aiLoading?"#7B1C1C":"#cbd5e1",color:"#fff",border:"none",borderRadius:6,fontWeight:700,fontSize:12,cursor:"pointer"}}>{aiLoading?"...":"Ask"}</button>
                {aiMessages.length>0&&<button onClick={()=>setAiMessages([])} style={{padding:"8px 10px",background:"transparent",border:"1px solid #fecaca",borderRadius:6,fontSize:11,color:"#7B1C1C",cursor:"pointer"}}>Clear</button>}
              </div>
            </div>

            {/* Quote summary */}
            <div className="card" style={{padding:16,border:"1.5px solid #7B1C1C"}}>
              <div className="card-title" style={{marginBottom:12,paddingBottom:8,borderBottomColor:"#fecaca"}}>
                <span className="dot" style={{background:"#7B1C1C"}}/>
                {innerTab==="log"?"Job Summary — Internal":"Quote Summary — Internal"}
              </div>

              {/* Dispatch line */}
              {(()=>{
                const d = DISPATCH_FEES.find(f=>f.id===dispatchId);
                if(!d) return null;
                const price = plan==="plan20"?d.plan20:plan==="plan10"?d.plan10:d.regular;
                const note = plan==="plan20"&&d.plan20note?d.plan20note:null;
                return (
                  <div style={{padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                      <span style={{color:"var(--text3)"}}>{d.label}</span>
                      <span style={{fontFamily:"var(--font-mono)",fontWeight:700,color:price===0&&d.regular>0?"var(--green)":"var(--text)"}}>{price===0&&d.regular>0?"WAIVED":"$"+price.toFixed(2)}</span>
                    </div>
                    {note&&<div style={{fontSize:11,color:"var(--green)",marginTop:1}}>{note}</div>}
                  </div>
                );
              })()}

              {/* Line items */}
              {lineItems.length>0?(
                <>
                  {lineItems.map((item,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid var(--border)",fontSize:12}}>
                      <span style={{fontSize:10,background:item.type==="part"?"#eff6ff":"#fff5f5",color:item.type==="part"?"var(--blue)":"#7B1C1C",borderRadius:3,padding:"1px 5px",fontWeight:700,flexShrink:0}}>{item.type==="part"?"PART":"SVC"}</span>
                      <span style={{flex:1,color:"var(--text2)"}}>{item.label}{item.hrs>0&&<span style={{color:"var(--text4)",marginLeft:4}}>({item.hrs}hr)</span>}</span>
                      <input type="number" value={item.price.toFixed(2)} onChange={e=>updPrice(i,e.target.value)} style={{width:72,fontFamily:"var(--font-mono)",fontSize:12,fontWeight:700,border:"1px solid var(--border)",borderRadius:4,padding:"2px 6px",textAlign:"right"}} />
                      <button onClick={()=>remLine(i)} style={{background:"transparent",border:"none",color:"#dc2626",cursor:"pointer",fontSize:13,flexShrink:0}}>x</button>
                    </div>
                  ))}
                  {discountPct>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:12,color:"var(--green)",fontWeight:700}}><span>{plan==="plan20"?"Premium Plan 20% off":"Plan 10% off"}</span><span>-${lineDiscount.toFixed(2)}</span></div>}
                </>
              ):(
                <div style={{padding:"16px 0",textAlign:"center",color:"var(--text4)",fontSize:12}}>No items added yet — use AI assistant or search above</div>
              )}

              {/* Totals */}
              {(lineItems.length>0||dispatchFee>0)&&(
                <>
                  {dispatchFee>0&&lineItems.length>0&&(
                    <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12,color:"var(--text3)"}}>
                      <span>Repair subtotal</span><span style={{fontFamily:"var(--font-mono)"}}>${lineTotal.toFixed(2)}</span>
                    </div>
                  )}
                  <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 4px",borderTop:"2px solid var(--border)",fontSize:15,fontWeight:700,color:"#7B1C1C",marginTop:4}}>
                    <span>Total Collected</span><span>${grandTotal.toFixed(2)}</span>
                  </div>
                  {dispatchFee>0&&<div style={{fontSize:11,color:"var(--text4)",marginBottom:4}}>Incl. ${dispatchFee.toFixed(2)} dispatch · GP% calculated on repair only (${lineTotal.toFixed(2)})</div>}
                  {innerTab==="quote"&&returnTrip&&<div style={{fontSize:11,color:"var(--text4)"}}>Return trip ${RETURN_TRIP_COST.toFixed(2)} hidden in pricing</div>}

                  {/* Time entry — LOG mode */}
                  {innerTab==="log"&&(
                    <div style={{background:"var(--surface2)",borderRadius:6,padding:"12px 14px",marginTop:10}}>

                    {cols.map(job=>(

                          {stage==="scheduled"&&<><button onClick={()=>moveSvcStage(job.id,"inprogress")} style={{fontSize:11,padding:"3px 10px",background:SVC_STAGE_CFG.inprogress.bg,border:`1px solid ${SVC_STAGE_CFG.inprogress.border}`,borderRadius:4,cursor:"pointer",color:SVC_STAGE_CFG.inprogress.color,fontWeight:700}}>Start</button><button onClick={()=>moveSvcStage(job.id,"lost")} style={{fontSize:11,padding:"3px 10px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:4,cursor:"pointer",color:"#dc2626",fontWeight:700}}>Lost</button></>}
                          {stage==="inprogress"&&<button onClick={()=>moveSvcStage(job.id,"completed")} style={{fontSize:11,padding:"3px 10px",background:SVC_STAGE_CFG.completed.bg,border:`1px solid ${SVC_STAGE_CFG.completed.border}`,borderRadius:4,cursor:"pointer",color:SVC_STAGE_CFG.completed.color,fontWeight:700}}>Complete → Review</button>}
                          {stage==="completed"&&<span style={{fontSize:11,padding:"3px 10px",background:SVC_STAGE_CFG.completed.bg,border:`1px solid ${SVC_STAGE_CFG.completed.border}`,borderRadius:4,color:SVC_STAGE_CFG.completed.color,fontWeight:700}}>Reviewed ✓</span>}

                      </div>
                    ))}
                    {cols.length===0&&<div style={{border:"1.5px dashed #e2e8f0",borderRadius:8,minHeight:60,display:"flex",alignItems:"center",justifyContent:"center",color:"#cbd5e1",fontSize:12}}>Empty</div>}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Completed reviews */}
          {svcCompleted.length>0&&(
            <div className="card">
              <div className="card-title" style={{cursor:"pointer"}} onClick={()=>setShowSvcCompleted(!showSvcCompleted)}>
                <span className="dot" style={{background:"#7B1C1C"}}/>Completed Job History ({svcCompleted.length})
                <span style={{marginLeft:"auto",fontSize:12,color:"var(--text4)",fontWeight:400}}>{showSvcCompleted?"▲ Hide":"▼ Show"}</span>
              </div>
              {showSvcCompleted&&(
                <table className="data-table">
                  <thead><tr><th>Customer</th><th>Equipment</th><th>Dispatch</th><th>Repair Rev</th><th>Act Hrs</th><th>On-Site</th><th>Repair GP%</th><th>Result</th><th>Date</th></tr></thead>
                  <tbody>{svcCompleted.map(j=>(
                    <tr key={j.id}>
                      <td className="strong">{j.customer}</td>
                      <td style={{fontSize:12,color:"var(--text3)"}}>{j.equipment||"—"}</td>
                      <td className="mono" style={{color:"var(--text3)"}}>${(j.dispatchFee||0).toFixed(2)}</td>
                      <td className="mono" style={{fontWeight:700}}>${(j.repairRevenue||j.total||0).toFixed(2)}</td>
                      <td className="mono">{j.actualHrs>0?j.actualHrs.toFixed(2):"—"}</td>
                      <td className="mono" style={{color:"var(--text4)"}}>{j.onSiteHrs>0?j.onSiteHrs.toFixed(2):"—"}</td>
                      <td><span className={"badge "+(j.gpPct>=GP?"badge-a":j.gpPct>=25?"badge-b":"badge-warn")}>{fmtPct(j.gpPct||0)}</span></td>
                      <td><span className={"badge "+(j.result==="fixed"?"badge-a":j.result==="callback"?"badge-warn":"badge-b")}>{j.result||"—"}</span></td>
                      <td style={{fontSize:11,color:"var(--text4)"}}>{j.completedDate}</td>
                    </tr>
                  ))}</tbody>
                </table>
              )}
            </div>
          )}

          {/* Lost quotes */}
          {svcLost.length>0&&(
            <div style={{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
              <button onClick={()=>setShowSvcLost(!showSvcLost)} style={{width:"100%",padding:"10px 16px",background:"#f8fafc",border:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1}}>Lost Quotes ({svcLost.length})</span>
                <span style={{fontSize:12,color:"#94a3b8"}}>{showSvcLost?"▲ Hide":"▼ Show"}</span>
              </button>
              {showSvcLost&&<div style={{padding:"10px 16px",display:"flex",flexDirection:"column",gap:6}}>
                {svcLost.map(job=>(
                  <div key={job.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"#f8fafc",borderRadius:6}}>
                    <div><span style={{fontSize:13,fontWeight:700,color:"#64748b"}}>{job.customer}</span><span style={{fontSize:12,color:"#94a3b8",marginLeft:8}}>{job.equipment} · ${(job.total||0).toFixed(2)}</span></div>
                    <button onClick={()=>saveSvcJobs(svcJobs.map(j=>j.id===job.id?{...j,stage:"open"}:j))} style={{fontSize:11,padding:"3px 10px",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:4,cursor:"pointer",color:"#2563eb",fontWeight:700}}>Reopen</button>
                  </div>
                ))}
              </div>}
            </div>
          )}
        </div>
      )}

      {reviewingJob&&<ServiceJobReview job={reviewingJob} onSave={handleSvcReview} onCancel={()=>setReviewingJob(null)} />}
    </div>
  );
}

          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-title"><span className="dot"/>Scenario Comparison</div>
        {scens.map(s=>{const n=calcNI(s.g,s.gp);const p=Math.max(5,Math.min((n/250000)*100,100));return(
          <div className="scenario-row" key={s.l}>

      </div>
    </div>
  );
}
